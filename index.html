<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>윤다미 시집 『신세기 도킹 스테이션』</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1 id="main-title">신세기 도킹 스테이션</h1>
        </header>

        <main id="random-trigger">
            <div class="image-area">
                <img id="display-image" src="https://via.placeholder.com/600x400/003366/ffffff?text=Click+Me" alt="시적인 사진">
            </div>

            <div class="verse-area">
                <p id="display-verse">
                    (사진이나 시구를 클릭해 보세요.<br>
                    새로운 문장이 나타납니다.)
                </p>
            </div>
        </main>

        <footer>
            <div class="book-info">
                <div class="purchase-links">
                    <h2 id="book-title">윤다미 시집 『신세기 도킹 스테이션』</h2>
                    <div class="button-group">
                        <a href="#" class="link-btn">교보문고</a>
                        <a href="#" class="link-btn">알라딘</a>
                        <a href="#" class="link-btn">예스24</a>
                    </div>
                </div>
                <div class="book-cover">
                    <img src="https://via.placeholder.com/150x220/004080/ffffff?text=Book+Cover" alt="시집 표지">
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
